<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Flip Card</title>

    <style>
        /* Flip only on larger screens */
        @media (hover:hover) and (pointer:fine) {
            .card-inner:hover {
                transform: rotateY(180deg);
            }
        }

        /* Disable flip on tablet/mobile */
        @media (max-width: 1024px) {
            .card-inner {
                transform: none !important;
            }

            .card-back {
                display: none;
            }
        }
    </style>

</head>

<body style="margin:0; background:#f2f2f2; font-family:Arial, Helvetica, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh;">

<div style="width:340px; height:440px; perspective:1000px;">

    <div class="card-inner"
         style="
      width:100%;
      height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform 0.6s;
    "
    >

        ```
        <!-- FRONT -->
        <div style="
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  border-radius:20px;
  padding:22px;
  box-sizing:border-box;
  backface-visibility:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
">

            <img
                    src="https://via.placeholder.com/320x180"
                    style="
      width:100%;
      height:180px;
      object-fit:cover;
      border-radius:12px;
      margin-bottom:16px;
    "
            >

            <div style="font-size:14px; font-weight:bold; color:#555;">
                Aquent
            </div>

            <div style="font-size:20px; font-weight:bold; margin-bottom:10px;">
                Employee Recruiting Portal
            </div>

            <div style="font-size:14px; color:#555; line-height:1.5; margin-bottom:16px;">
                Impact: Enabled the business to hire new talent faster and better communicate their key value proposition.
            </div>

            <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:auto;">

                <span style="background:#eef2ff; color:#4f46e5; padding:4px 10px; border-radius:999px; font-size:12px;">UX</span>
                <span style="background:#eef2ff; color:#4f46e5; padding:4px 10px; border-radius:999px; font-size:12px;">UXR</span>
                <span style="background:#eef2ff; color:#4f46e5; padding:4px 10px; border-radius:999px; font-size:12px;">UI</span>
                <span style="background:#eef2ff; color:#4f46e5; padding:4px 10px; border-radius:999px; font-size:12px;">Visual</span>

            </div>

        </div>

        <!-- BACK -->
        <div class="card-back"
             style="
    position:absolute;
    width:100%;
    height:100%;
    background:#D39B3A;
    border-radius:20px;
    backface-visibility:hidden;
    transform:rotateY(180deg);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
  ">

            <div style="
    font-size:28px;
    font-weight:bold;
    color:white;
    letter-spacing:3px;
  ">
                AQUENT
            </div>

            <div style="
    font-size:11px;
    letter-spacing:2px;
    color:white;
    opacity:0.85;
  ">
                DISCIPLINES
            </div>

            <div style="
    display:grid;
    grid-template-columns:repeat(2,auto);
    gap:10px;
  ">

                <span style="background:white; color:#D39B3A; padding:6px 12px; border-radius:999px; font-size:13px;">UX</span>
                <span style="background:white; color:#D39B3A; padding:6px 12px; border-radius:999px; font-size:13px;">UXR</span>
                <span style="background:white; color:#D39B3A; padding:6px 12px; border-radius:999px; font-size:13px;">UI</span>
                <span style="background:white; color:#D39B3A; padding:6px 12px; border-radius:999px; font-size:13px;">Visual</span>

            </div>

        </div>

    </div>

</div>

</body>
</html>
